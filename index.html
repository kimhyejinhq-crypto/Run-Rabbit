<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐇 Run Rabbit</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="{{ url_for('static', filename='script.js') }}" defer></script>
</head>
<body>
    <div id="app">
        <header><h1>🐇 Run Rabbit</h1><p>Multiplayer – chọn nhân vật, tạo phòng, đua nhau về đích</p></header>

        <!-- Màn hình chọn nhân vật và phòng -->
        <section id="login-section">
            <div class="character-select">
                <label>Chọn nhân vật:</label>
                <div class="characters">
                    <div class="char" data-name="Thỏ">🐇 Thỏ</div>
                    <div class="char" data-name="Chim cánh cụt">🐧 Chim cánh cụt</div>
                    <div class="char" data-name="Cáo">🦊 Cáo</div>
                    <div class="char" data-name="Quạ">🐦‍⬛ Quạ</div>
                </div>
            </div>
            <div class="room-actions">
                <button id="create-room-btn">✨ Tạo phòng mới</button>
                <div class="join-area">
                    <input type="text" id="room-code-input" placeholder="Mã phòng (VD: ABCD)" maxlength="4">
                    <button id="join-room-btn">🔗 Tham gia</button>
                </div>
            </div>
            <div id="error-msg" class="error"></div>
        </section>

        <!-- Khu vực game -->
        <section id="game-section" style="display:none;">
            <div class="room-info">
                <span>🏠 Phòng: <strong id="room-code-display"></strong></span>
                <span>👥 Số người: <span id="player-count">0</span></span>
                <button id="leave-room-btn">🚪 Rời phòng</button>
            </div>
            <div id="board"></div>
            <div class="players-status">
                <h3>Danh sách người chơi</h3>
                <ul id="players-list"></ul>
            </div>
            <div class="game-controls">
                <button id="roll-btn" disabled>🎲 Tung xúc xắc</button>
                <div id="dice-result"></div>
                <div id="turn-indicator">⏳ Đang chờ...</div>
            </div>
        </section>
    </div>
</body>
</html>
