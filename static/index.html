<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐇 Run Rabbit</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="script.js" defer></script>
</head>
<body>
    <div id="app">
        <header>
            <h1>🐇 Run Rabbit</h1>
            <p>🔗 Một link – chọn nhân vật và vào chơi</p>
        </header>

        <!-- Màn hình chọn nhân vật -->
        <section id="login-section">
            <div class="character-select">
                <label>Chọn nhân vật của bạn:</label>
                <div class="characters">
                    <div class="char" data-name="Thỏ">🐇 Thỏ</div>
                    <div class="char" data-name="Chim cánh cụt">🐧 Chim cánh cụt</div>
                    <div class="char" data-name="Cáo">🦊 Cáo</div>
                    <div class="char" data-name="Quạ">🐦‍⬛ Quạ</div>
                </div>
            </div>
            <button id="join-btn" disabled>🎮 Vào phòng chơi</button>
            <div id="error-msg" class="error"></div>
        </section>

        <!-- Màn hình game -->
        <section id="game-section" style="display:none;">
            <div class="room-info">
                <span>🏠 Phòng: <strong>RABBIT</strong></span>
                <span>👥 Số người: <span id="player-count">0</span></span>
            </div>
            <div class="game-board">
                <div id="board"></div>
            </div>
            <div class="players-status">
                <h3>Danh sách người chơi</h3>
                <ul id="players-list"></ul>
            </div>
            <div class="game-controls">
                <button id="roll-btn">🎲 Tung xúc xắc</button>
                <div id="dice-result"></div>
                <div id="turn-indicator">✅ Ai cũng có thể tung (không lượt)</div>
            </div>
        </section>
    </div>
</body>
</html>[reference:1]
